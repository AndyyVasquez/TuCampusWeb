<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuCampus - Login</title>

<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/components.css">
</head>

<body class="centered">
  <div class="phone">

    <div class="navbar">
      <div class="nav-left">
        <button class="iconbtn" onclick="history.back()">←</button>
        <h2>Login</h2>
      </div>
      <div class="nav-right">
        <button class="iconbtn" title="Configuración">⚙️</button>
        <button class="iconbtn" onclick="toggleTheme()" title="Cambiar tema">🌓</button>
      </div>
    </div>

    <div class="card" style="padding:26px;">
      <div style="width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));
        display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;margin-bottom:18px;">TC</div>

      <div style="font-size:22px;font-weight:900;margin-bottom:8px;">Iniciar sesión</div>
      <div style="color:var(--muted);margin-bottom:18px;font-size:14px;line-height:1.35;">
        Accede con tu cuenta institucional para continuar.
      </div>

      <div style="margin-bottom:14px;">
        <label class="label">Correo</label>
        <input class="input" type="email" placeholder="tucorreo@uteq.edu.mx" autocomplete="username">
      </div>

      <div style="margin-bottom:18px;">
        <label class="label">Contraseña</label>
        <input class="input" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn primary" style="width:100%;" onclick="location.href='home.html'">Entrar</button>

      <div class="helper">
        ¿Olvidaste tu contraseña? <span style="color:var(--primary);font-weight:800;cursor:pointer;">Recuperar</span>
      </div>
    </div>

  </div>

<script>
function applySavedTheme(){
  const saved = localStorage.getItem('theme');
  if(saved === 'dark'){ document.body.classList.add('dark'); }
  else { document.body.classList.remove('dark'); }
}
function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
document.addEventListener('DOMContentLoaded', applySavedTheme);
</script>
</body>
</html>
